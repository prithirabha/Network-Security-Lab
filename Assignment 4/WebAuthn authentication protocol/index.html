<!DOCTYPE html>
<html>
<head>
    <title>WebAuthn Demo</title>
</head>
<body>

<h2>🔐 WebAuthn Authentication System</h2>

<input id="username" placeholder="Enter username">
<br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="status"></p>

<script>
function setStatus(msg) {
    document.getElementById("status").innerText = msg;
}

// 🔧 Base64URL decode
function bufferDecode(value) {
    value = value.replace(/-/g, '+').replace(/_/g, '/');
    while (value.length % 4) value += '=';
    return Uint8Array.from(atob(value), c => c.charCodeAt(0));
}

// 🔧 Base64URL encode
function bufferEncode(value) {
    return btoa(String.fromCharCode(...new Uint8Array(value)))
        .replace(/\+/g, "-")
        .replace(/\//g, "_")
        .replace(/=/g, "");
}

let isRegistering = false;

// 🔐 REGISTER
async function register() {

    const username = document.getElementById("username").value;
    if (!username) {
        alert("Enter username");
        return;
    }

    if (isRegistering) {
        alert("Already in progress...");
        return;
    }

    isRegistering = true;

    try {
        setStatus("🔄 Generating registration challenge...");

        const res = await fetch(`/register-challenge?username=${username}`);
        const options = await res.json();

        options.challenge = bufferDecode(options.challenge);
        options.user.id = bufferDecode(options.user.id);

        console.log("Register options:", options);

        await new Promise(r => setTimeout(r, 300));

        setStatus("🔐 Waiting for authenticator...");

        const credential = await navigator.credentials.create({
            publicKey: {
                ...options,
                authenticatorSelection: {
                    authenticatorAttachment: "cross-platform",
                    requireResidentKey: true,
                    userVerification: "required"
                },
                residentKey: "required"
            }
        });

        console.log("Credential:", credential);

        await fetch("/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: username,
                id: credential.id,
                rawId: bufferEncode(credential.rawId)
            })
        });

        setStatus("✅ Registration Successful");

    } catch (err) {
        console.error(err);
        setStatus("❌ Registration Failed");
    }

    isRegistering = false;
}

// 🔑 LOGIN
async function login() {

    const username = document.getElementById("username").value;
    if (!username) {
        alert("Enter username");
        return;
    }

    try {
        setStatus("🔄 Generating login challenge...");

        const res = await fetch(`/login-challenge?username=${username}`);
        const options = await res.json();

        options.challenge = bufferDecode(options.challenge);

        await new Promise(r => setTimeout(r, 300));

        setStatus("🔐 Authenticating...");

        const assertion = await navigator.credentials.get({
            publicKey: {
                ...options,
                userVerification: "required"
            }
        });

        console.log("Assertion:", assertion);

        const verify = await fetch("/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ username: username })
        });

        const result = await verify.json();

        setStatus(result.message);

    } catch (err) {
        console.error(err);
        setStatus("❌ Login Failed");
    }
}
</script>

</body>
</html>
